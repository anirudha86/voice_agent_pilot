<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Medical Voice - Local AI Agent for Doctors</title>
    <meta name="description" content="A premium, local-first voice dictation agent for healthcare professionals.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">A</div>
                <div class="logo-text">Aura<span>Medical</span></div>
            </div>
            <nav class="nav-menu">
                <button class="nav-item active" data-view="view-consultation">
                    <span class="icon">➕</span> Consultation
                </button>
                <button class="nav-item" data-view="view-history">
                    <span class="icon">📁</span> Past Records
                </button>
                <button class="nav-item" data-view="view-registration">
                    <span class="icon">👤</span> Registration
                </button>
            </nav>
            <div class="model-status">
                <div class="status-indicator online"></div>
                <div class="status-info">
                    <p class="status-label">Local Engine</p>
                    <p class="status-model">Canary-Qwen 2.5B</p>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- View: Consultation -->
            <div id="view-consultation" class="view active">
                <header class="header">
                    <h1>New Consultation</h1>
                    <div class="header-actions">
                        <button id="btn-generate-pdf" class="btn-primary" disabled>
                            <span>📄</span> Generate PDF
                        </button>
                    </div>
                </header>

                <div class="consultation-setup glass">
                    <div class="setup-group">
                        <label>Select Doctor</label>
                        <select id="select-doctor">
                            <option value="">Select a Doctor...</option>
                        </select>
                    </div>
                    <div class="setup-group">
                        <label>Select Patient</label>
                        <select id="select-patient">
                            <option value="">Select a Patient...</option>
                        </select>
                    </div>
                </div>

                <div class="dashboard-grid">
                    <section class="recording-card glass">
                        <div class="visualizer-container">
                            <canvas id="audio-visualizer"></canvas>
                            <div class="timer" id="recording-timer">00:00</div>
                        </div>
                        <div class="dictation-status" id="dictation-status">Select doctor & patient to start...</div>
                        
                        <div class="engine-selector">
                            <label class="engine-option">
                                <input type="radio" name="asr-engine" value="whisper" checked>
                                <div class="engine-pill">
                                    <span class="engine-icon">🌬️</span>
                                    <span class="engine-name">Whisper</span>
                                </div>
                            </label>
                            <label class="engine-option">
                                <input type="radio" name="asr-engine" value="parakeet">
                                <div class="engine-pill">
                                    <span class="engine-icon">🦜</span>
                                    <span class="engine-name">Parakeet</span>
                                </div>
                            </label>
                        </div>

                        <div class="controls">
                            <button id="btn-record" class="record-button" disabled>
                                <div class="mic-icon"></div>
                            </button>
                        </div>

                        <div class="transcription-preview">
                            <h3>Live Transcription</h3>
                            <div id="live-transcript" class="transcript-box" contenteditable="true"></div>
                            <div class="transcript-actions">
                                <button id="btn-process" class="btn-secondary" disabled>✨ Process Report</button>
                                <button id="btn-clear" class="btn-tertiary">🗑️ Clear</button>
                            </div>
                        </div>
                    </section>

                    <section class="report-card glass">
                        <div class="report-sections">
                            <div class="report-group">
                                <label>Patient History</label>
                                <textarea id="history"></textarea>
                            </div>
                            <div class="report-group">
                                <label>Symptoms</label>
                                <textarea id="symptoms"></textarea>
                            </div>
                            <div class="report-group">
                                <label>Diagnosis</label>
                                <textarea id="remedies"></textarea>
                            </div>
                            <div class="report-group">
                                <label>Medications</label>
                                <textarea id="medications"></textarea>
                            </div>
                            <div class="report-group">
                                <label>Outcome</label>
                                <textarea id="outcome"></textarea>
                            </div>
                            <div class="report-group">
                                <label>Next Steps</label>
                                <textarea id="next_steps"></textarea>
                            </div>
                        </div>
                    </section>
                </div>
            </div>

            <!-- View: Records History -->
            <div id="view-history" class="view">
                <header class="header">
                    <h1>Consultation History</h1>
                    <div class="header-actions">
                        <select id="filter-doctor" class="filter-select">
                            <option value="">All Doctors</option>
                        </select>
                    </div>
                </header>
                <div class="table-container glass">
                    <table id="history-table">
                        <thead>
                            <tr>
                                <th>Date</th>
                                <th>Patient</th>
                                <th>Doctor</th>
                                <th>Transcript</th>
                                <th>Audio</th>
                            </tr>
                        </thead>
                        <tbody></tbody>
                    </table>
                </div>
            </div>

            <!-- View: Registration -->
            <div id="view-registration" class="view">
                <header class="header">
                    <h1>Management</h1>
                </header>
                <div class="management-grid">
                    <div class="reg-card glass">
                        <h2>Doctor Registration</h2>
                        <form id="form-doctor">
                            <div class="form-group">
                                <label>Doctor Name</label>
                                <input type="text" name="name" required>
                            </div>
                            <div class="form-group">
                                <label>Speciality</label>
                                <input type="text" name="speciality" required>
                            </div>
                            <button type="submit" class="btn-primary">Register Doctor</button>
                        </form>
                    </div>

                    <div class="reg-card glass">
                        <h2>Patient Registration</h2>
                        <form id="form-patient">
                            <div class="form-group">
                                <label>Patient Name</label>
                                <input type="text" name="name" required>
                            </div>
                            <div class="form-group">
                                <label>Address</label>
                                <input type="text" name="address">
                            </div>
                            <div class="form-group">
                                <label>Contact Number</label>
                                <input type="text" name="contact">
                            </div>
                            <button type="submit" class="btn-primary">Register Patient</button>
                        </form>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div id="notification-container" class="notification-container"></div>
    <script src="script.js"></script>
</body>
</html>
